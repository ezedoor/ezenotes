<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ezenotes - a note taking app</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/ez-favicon.png">
</head>
<body>
    <div class="logo-container">
        <img id="logo" src="images/ez-logo.png" alt="ezenotes logo">
        <span><h1>ezenotes - a note taking app</h1></span>
    </div>
        <div class="new-open-buttons-container">
            <button class="new-note">New note</button>
            <button class="open-note">Open note</button>
        </div>
    </div>
    <div>
        <div id="textarea-container">
        <textarea placeholder="whats new?"></textarea>
        </div>
    </div>
    <div class="hidden" id="save-delete-buttons-container">
        <button class="save-note">Save note</button>
        <button class="delete-note">Delete note</button>
    </div>
</html>
